<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Employment History - CTS Transportation</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;800;900&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: "#002F6C",
                            light: "#1e4c8c",
                            dark: "#001d4a",
                        },
                        accent: "#FBB917",
                        surface: {
                            DEFAULT: "#F9FBFF",
                            dark: "#121417",
                        },
                    },
                    fontFamily: {
                        headline: ["Outfit", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            min-height: max(884px, 100dvh);
            background: #f8f9fa;
        }
    </style>
</head>
<body class="bg-surface text-on-background font-body min-h-screen">
    <header class="fixed top-0 left-0 w-full z-50 bg-white/95 backdrop-blur-md flex justify-between items-center px-6 md:px-12 h-20 border-b border-slate-100">
        <div class="flex justify-between items-center w-full max-w-7xl mx-auto">
            <div class="flex items-center gap-3 group cursor-pointer" onclick="window.location.href='index.html'">
                <div class="w-10 h-10 bg-primary flex items-center justify-center rounded-xl shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings: 'FILL' 1;">local_shipping</span>
                </div>
                <h1 class="font-headline font-black text-primary uppercase tracking-wider text-xl hidden sm:block">
                    CTS <span class="text-primary-light opacity-80">TRANSPORT</span>
                </h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex flex-col items-end">
                    <span class="text-[10px] font-bold text-primary uppercase tracking-[0.2em] mb-1">Process Status</span>
                    <div class="w-32 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                        <div class="bg-accent h-full w-[80%]" style="transition: width 1s cubic-bezier(0.175, 0.885, 0.32, 1.275)"></div>
                    </div>
                </div>
                <div class="w-11 h-11 rounded-full p-[2px] bg-gradient-to-tr from-accent to-primary flex items-center justify-center shadow-lg overflow-hidden">
                    <img class="w-full h-full rounded-full object-cover border-2 border-white" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA7kRAiz8MsUFzIgMKcbWlzJ8X2wvz29CE-uuqqXTYijMfqAQZey2wI2tubgbOlQPIvjokHR9jbgnkEop1VSxKrr1SLJgt-29hjYbEre-1VRaX6W_xmZDCEltAvc4gJHDdkX4Z549q03WmpLXt1RCC-wEUa3FHyRR4mhBixVT6QsM4wUXr06Y5qFMPgu7nHFK4NsA2V41X0NbOwRwEVnT3xYSZy1-vbx9C6WcM2T4KORSpboZjY5dOOZdEfVzmZi7Pb3cj_7ewWznQ"/>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-6 py-12 pb-48 space-y-12">
        <!-- Header Section -->
        <section class="space-y-4">
            <p class="text-primary font-black text-xs tracking-[0.2em] uppercase">Section 5 of 6</p>
            <h2 class="font-headline font-black text-5xl text-on-surface leading-none tracking-tighter">Employment<br>History</h2>
            <p class="text-slate-500 font-medium text-lg leading-relaxed max-w-md">Please provide your previous 10 years of employment history, starting with your most recent position.</p>
        </section>

        <!-- Repeatable Form Card 1 -->
        <div class="bg-white p-10 rounded-[2.5rem] shadow-xl shadow-primary/5 border border-slate-100 space-y-10 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-8">
                <span class="text-primary/5 font-black text-8xl select-none">01</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-primary/10 flex items-center justify-center rounded-2xl">
                    <span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">work</span>
                </div>
                <h3 class="font-headline font-black text-2xl text-on-surface uppercase tracking-tight">Most Recent Employer</h3>
            </div>
            <div class="grid grid-cols-1 gap-8 relative z-10">
                <!-- Company Name -->
                <div class="space-y-2">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Name of Company</label>
                    <input class="w-full bg-slate-50 border-transparent focus:border-primary/20 rounded-2xl p-4 text-base font-semibold focus:ring-4 focus:ring-primary/5 transition-all" placeholder="e.g. Continental Logistics" type="text" data-field="emp1_company"/>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Contact Person -->
                    <div class="space-y-2">
                        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Contact Person</label>
                        <input class="w-full bg-slate-50 border-transparent focus:border-primary/20 rounded-2xl p-4 text-base font-semibold focus:ring-4 focus:ring-primary/5 transition-all" placeholder="Full Name" type="text" data-field="emp1_contact"/>
                    </div>
                    <!-- Phone -->
                    <div class="space-y-2">
                        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Phone Number</label>
                        <input class="w-full bg-slate-50 border-transparent focus:border-primary/20 rounded-2xl p-4 text-base font-semibold focus:ring-4 focus:ring-primary/5 transition-all" placeholder="(555) 000-0000" type="tel" data-field="emp1_phone"/>
                    </div>
                </div>
                <!-- Address Cluster -->
                <div class="space-y-2">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Location Details</label>
                    <div class="grid grid-cols-1 sm:grid-cols-6 gap-3">
                        <input class="sm:col-span-3 bg-slate-50 border-transparent focus:border-primary/20 rounded-2xl p-4 text-base font-semibold focus:ring-4 focus:ring-primary/5 transition-all" placeholder="City" type="text" data-field="emp1_city"/>
                        <input class="sm:col-span-1 bg-slate-50 border-transparent focus:border-primary/20 rounded-2xl p-4 text-base font-semibold focus:ring-4 focus:ring-primary/5 transition-all" placeholder="ST" type="text" data-field="emp1_state"/>
                        <input class="sm:col-span-2 bg-slate-50 border-transparent focus:border-primary/20 rounded-2xl p-4 text-base font-semibold focus:ring-4 focus:ring-primary/5 transition-all" placeholder="Zip" type="text" data-field="emp1_zip"/>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Dates -->
                    <div class="space-y-2">
                        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">From Date</label>
                        <input class="w-full bg-slate-50 border-transparent focus:border-primary/20 rounded-2xl p-4 text-base font-semibold focus:ring-4 focus:ring-primary/5 transition-all" type="date" data-field="emp1_from"/>
                    </div>
                    <div class="space-y-2">
                        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">To Date</label>
                        <input class="w-full bg-slate-50 border-transparent focus:border-primary/20 rounded-2xl p-4 text-base font-semibold focus:ring-4 focus:ring-primary/5 transition-all" type="date" data-field="emp1_to"/>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Position -->
                    <div class="space-y-2">
                        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Position Held</label>
                        <input class="w-full bg-slate-50 border-transparent focus:border-primary/20 rounded-2xl p-4 text-base font-semibold focus:ring-4 focus:ring-primary/5 transition-all" placeholder="Job Title" type="text" data-field="emp1_position"/>
                    </div>
                    <!-- Trailer -->
                    <div class="space-y-2">
                        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Type of Trailer</label>
                        <select class="w-full bg-slate-50 border-transparent focus:border-primary/20 rounded-2xl p-4 text-base font-semibold focus:ring-4 focus:ring-primary/5 transition-all appearance-none" data-field="emp1_trailer">
                            <option>Dry Van</option>
                            <option>Flatbed</option>
                            <option>Reefer</option>
                            <option>Tanker</option>
                        </select>
                    </div>
                </div>
                <!-- Reason for Leaving -->
                <div class="space-y-2">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Reason for Leaving</label>
                    <textarea class="w-full bg-slate-50 border-transparent focus:border-primary/20 rounded-2xl p-4 text-base font-semibold focus:ring-4 focus:ring-primary/5 transition-all" placeholder="Brief explanation..." rows="2" data-field="emp1_reason"></textarea>
                </div>
                <!-- Compliance Checkboxes -->
                <div class="bg-primary/5 rounded-[2rem] p-8 space-y-6 border border-primary/10">
                    <label class="flex items-start gap-4 cursor-pointer group">
                        <input class="mt-1 w-6 h-6 rounded-lg border-primary/20 text-primary focus:ring-primary/30 bg-white" type="checkbox" data-field="emp1_fmcsr"/>
                        <div class="flex flex-col">
                            <span class="text-sm font-black text-primary uppercase tracking-wide">Subject to FMCSRs</span>
                            <span class="text-xs text-slate-500 font-medium">Were you subject to Federal Motor Carrier Safety Regulations?</span>
                        </div>
                    </label>
                    <label class="flex items-start gap-4 cursor-pointer group">
                        <input class="mt-1 w-6 h-6 rounded-lg border-primary/20 text-primary focus:ring-primary/30 bg-white" type="checkbox" data-field="emp1_safety_sensitive"/>
                        <div class="flex flex-col">
                            <span class="text-sm font-black text-primary uppercase tracking-wide">Safety-Sensitive Function</span>
                            <span class="text-xs text-slate-500 font-medium">Was this position a safety-sensitive function subject to DOT drug/alcohol testing?</span>
                        </div>
                    </label>
                </div>
            </div>
        </div>

        <!-- Add Another Entry Trigger -->
        <button class="w-full py-6 border-2 border-dashed border-slate-200 rounded-[2rem] flex items-center justify-center gap-3 text-primary hover:bg-white transition-all font-black uppercase tracking-widest text-xs">
            <span class="material-symbols-outlined">add_circle</span>
            Add Previous Employer
        </button>

        <!-- Space for Fixed Footer -->
        <div class="h-32"></div>
    </main>

    <footer class="fixed bottom-0 left-0 w-full z-50 bg-white/95 backdrop-blur-md flex flex-col px-6 py-4 border-t border-slate-100 shadow-[0_-4px_12px_0_rgba(0,0,0,0.05)]">
        <div class="flex items-center justify-between gap-4 mb-4 max-w-3xl mx-auto w-full">
            <button type="button" onclick="window.location.href='authorization.html'" class="flex-1 py-3 text-xs font-black tracking-widest text-slate-400 border-2 border-slate-100 rounded-2xl hover:bg-slate-50 transition-all uppercase">
                BACK
            </button>
            <button type="button" onclick="window.location.href='safety-performance-history.html'" class="flex-[1.5] py-3 text-xs font-black tracking-widest text-white bg-primary rounded-2xl shadow-xl shadow-primary/20 hover:bg-primary-dark active:scale-95 transition-all uppercase flex items-center justify-center gap-2">
                NEXT
                <span class="material-symbols-outlined text-base">arrow_forward</span>
            </button>
        </div>
        <div class="max-w-3xl mx-auto w-full space-y-2">
            <div class="flex justify-between text-[10px] font-bold text-slate-400 tracking-widest uppercase">
                <span>Application Progress</span>
                <span>80% Complete</span>
            </div>
            <div class="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden">
                <div class="h-full bg-primary w-[80%] rounded-full shadow-[0_0_10px_rgba(30,76,140,0.3)]"></div>
            </div>
        </div>
    </footer>

    <nav class="md:hidden fixed bottom-6 left-6 right-6 z-40">
        <div class="bg-white/90 backdrop-blur-xl border border-white/40 shadow-2xl rounded-3xl flex justify-around items-center p-3">
             <a href="index.html" class="flex flex-col items-center justify-center text-slate-400 px-6 py-3">
                <span class="material-symbols-outlined text-xl">home</span>
                <span class="text-[9px] font-black uppercase tracking-tighter mt-1">Home</span>
            </a>
            <div class="flex flex-col items-center justify-center bg-primary text-white rounded-2xl px-6 py-3 shadow-lg shadow-primary/30">
                <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">edit_note</span>
                <span class="text-[9px] font-black uppercase tracking-tighter mt-1">Apply</span>
            </div>
            <div class="flex flex-col items-center justify-center text-slate-400 px-6 py-3">
                <span class="material-symbols-outlined text-xl">fact_check</span>
                <span class="text-[9px] font-black uppercase tracking-tighter mt-1">Status</span>
            </div>
        </div>
    </nav>
    <script src="storage-handler.js"></script>
</body>
</html>
